<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 5 fazer contador</title>
  <style>
    /* Define o estilo inicial da div */
    #myDiv {
      width: 200px;
      height: 200px;
      background-color: rgb(255, 0, 0);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <!-- Botão que será usado para mudar a cor da div -->
  <button id="myButton">Contador</button>

  <div id="contador">0</div>

  <!-- Div que terá sua cor de fundo alterada -->
  <p id="myDiv"></p>

  <!-- Script JavaScript embutido na página -->
  <script>
    // Seleciona o botão e a div pelo ID

    // 1ª Digitação (Aqui)
    const button = document.querySelector('#myButton');
    const div = document.querySelector('#myDiv');

    // Adiciona um evento de clique ao botão
      let cliques = 0;
    
    const Button = document.querySelector("#myButton");
    const paragrafo = document.querySelector("#contador");

    button.addEventListener("click", () =>  {
        cliques++;
        paragrafo.textContent = + cliques;

        
      // Verifica a cor atual da div e alterna entre lightblue e lightcoral
      if (div.style.backgroundColor === 'rgb(255, 0, 0)') {
        div.style.backgroundColor = 'rgb(0, 255, 68)';
      } else {
        div.style.backgroundColor = 'rgb(255, 0, 0)';
      }
    });


  </script>
</body>
</html>
